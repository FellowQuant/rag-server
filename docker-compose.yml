services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage:z
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  rag-server:
    build: .
    container_name: rag-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:z
    environment:
      - DATA_DIR=/app/data
      - QDRANT_HOST=qdrant
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app
